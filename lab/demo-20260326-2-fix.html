<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jih Cheng Machinery - Fixed Nav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --jc-blue: #27348E;
            --jc-silver: #999999;
            --nav-bg: rgba(255, 255, 255, 0.98);
        }

        .navbar {
            padding: 1rem 0;
            background: var(--nav-bg);
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
        }

        /* --- 核心斷點: 1360px --- */
        @media (min-width: 1361px) {
            .navbar-expand-custom { flex-flow: row nowrap; justify-content: flex-start; }
            .navbar-expand-custom .navbar-nav { flex-direction: row; }
            .navbar-expand-custom .navbar-collapse { display: flex !important; flex-basis: auto; }
            .navbar-expand-custom .navbar-toggler { display: none; }
            
            /* 桌機版：Hover 觸發 */
            .nav-item.dropdown:hover .dropdown-menu {
                display: block;
                opacity: 1;
                transform: translateY(0);
                visibility: visible;
            }
        }

        @media (max-width: 1360px) {
            .navbar-collapse { display: none !important; } /* 強制隱藏原選單 */
            .navbar-toggler { display: block !important; }
        }

        /* 漢堡按鈕動畫 */
        .navbar-toggler { border: none; outline: none !important; box-shadow: none !important; padding: 10px; z-index: 1100; }
        .hamburger { width: 30px; height: 20px; position: relative; }
        .hamburger span { display: block; position: absolute; height: 2px; width: 100%; background: var(--jc-blue); transition: .3s; }
        .hamburger span:nth-child(1) { top: 0; }
        .hamburger span:nth-child(2) { top: 9px; }
        .hamburger span:nth-child(3) { top: 18px; }
        
        /* 漢堡變 X (透過 class 控制，同步 Offcanvas 狀態) */
        .is-active .hamburger span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .is-active .hamburger span:nth-child(2) { opacity: 0; }
        .is-active .hamburger span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* Offcanvas 滿版 */
        .offcanvas-full { width: 100% !important; border: none; background: var(--jc-blue); }
        .offcanvas-full .nav-link { color: white !important; font-size: 2rem; font-weight: 700; margin: 0.5rem 0; }
        
        /* 下拉選單樣式 */
        .dropdown-menu { 
            border: none; border-radius: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            transition: all 0.3s;
        }

        @media (max-width: 1360px) {
            .offcanvas-body .dropdown-menu {
                position: static; display: none; background: rgba(255,255,255,0.05); width: 100%;
            }
            .offcanvas-body .dropdown-menu.show { display: block; }
            .offcanvas-body .dropdown-item { color: rgba(255,255,255,0.7) !important; font-size: 1.2rem; text-align: center; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-custom fixed-top">
    <div class="container-fluid d-flex justify-content-between align-items-center px-4">
        <a class="navbar-brand" href="#">
            <svg width="150" height="40"><use xlink:href="#icon-logo-full"/></svg>
        </a>

        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav align-items-center">
                <li class="nav-item px-3"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item dropdown px-3">
                    <a class="nav-link dropdown-toggle" href="#" id="desktopDrop">Products</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Cartoning Machine</a></li>
                        <li><a class="dropdown-item" href="#">Filling Machine</a></li>
                    </ul>
                </li>
                <li class="nav-item px-3"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item ms-4">
                    <a class="btn btn-primary px-4 rounded-pill" style="background-color: #27348E;">Contact Us</a>
                </li>
            </ul>
        </div>

        <button class="navbar-toggler" id="hamburgerBtn" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav">
            <div class="hamburger">
                <span></span><span></span><span></span>
            </div>
        </button>
    </div>
</nav>

<div class="offcanvas offcanvas-end offcanvas-full" tabindex="-1" id="offcanvasNav">
    <div class="offcanvas-body d-flex flex-column align-items-center justify-content-center">
        <ul class="navbar-nav text-center">
            <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="mobileDrop">Products</a>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Cartoning Machine</a></li>
                    <li><a class="dropdown-item" href="#">Filling Machine</a></li>
                </ul>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        </ul>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const offcanvas = document.getElementById('offcanvasNav');
    const hamburger = document.getElementById('hamburgerBtn');
    const mobileDropToggle = document.getElementById('mobileDrop');

    // 1. 同步漢堡動畫狀態
    offcanvas.addEventListener('show.bs.offcanvas', () => hamburger.classList.add('is-active'));
    offcanvas.addEventListener('hide.bs.offcanvas', () => hamburger.classList.remove('is-active'));

    // 2. 行動端下拉邏輯 (修正點擊 Bug)
    mobileDropToggle.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        const menu = this.nextElementSibling;
        menu.classList.toggle('show');
        
        // GSAP 微動效
        if(menu.classList.contains('show')) {
            gsap.from(menu.querySelectorAll('.dropdown-item'), {
                opacity: 0, y: -10, stagger: 0.1, duration: 0.3
            });
        }
    });

    // 3. Offcanvas 打開時的 GSAP 華麗進場
    offcanvas.addEventListener('shown.bs.offcanvas', () => {
        gsap.from(".offcanvas-body .nav-link", {
            y: 30, opacity: 0, stagger: 0.1, duration: 0.5, ease: "power2.out"
        });
    });
});
</script>

</body>
</html>
