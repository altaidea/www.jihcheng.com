<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5 Offcanvas Search Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 核心關鍵：提升 Navbar 的層級 */
        .custom-top-nav {
            /* Bootstrap Offcanvas 的 z-index 是 1050
               遮罩 (backdrop) 的 z-index 是 1040
               我們將導覽列設為 1060，確保它在最上層
            */
            z-index: 1060 !important; 
        }

        /* 為了美觀，給內容一些間距 */
        body { padding-top: 70px; }
        
        .content-section {
            padding: 2rem;
            background: #f8f9fa;
            height: 2000px; /* 模擬長頁面 */
        }

        /* 讓導覽列高於 Offcanvas (1050) 與 遮罩 (1040) */
        .fixed-top {
            z-index: 1060 !important;
        }

        /* 強制讓搜尋框的 z-index 極高 */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 2000; /* 遠高於 Offcanvas 的 1050 */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top custom-top-nav">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Logo</a>
            
            <form class="d-flex ms-auto me-2">
                <input class="form-control me-2" type="search" placeholder="搜尋..." aria-label="Search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>

            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample">
                開啟選單
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel" data-bs-focus="false" data-bs-backdrop="true" data-bs-scroll="true">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasExampleLabel">側邊選單</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div>
                這裡是一些選單內容。你會發現後面的搜尋框依然可以點擊，因為 Navbar 的 z-index 被我們提升了。
            </div>
            <ul class="list-group mt-3">
                <li class="list-group-item">項目一</li>
                <li class="list-group-item">項目二</li>
                <li class="list-group-item">項目三</li>
            </ul>
        </div>
    </div>

    <div class="container content-section">
        <h3>內容標題</h3>
        <p>當你點擊右側的「開啟選單」時，雖然會有黑色遮罩出現，但上方的搜尋框依然是亮的且可以輸入文字。</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
