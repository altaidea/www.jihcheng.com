<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --temple-blue: #27348E; /* 您的聖殿藍 */
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
        }

        /* 核心容器 */
        .hill-container {
            position: relative;
            width: 100%;
            /* max-width: 800px; */
            /* 總高度 = 長方形 160px + 山丘隆起高度 */
            height: 340px; 
            display: flex;
            align-items: flex-end;
        }

        /* ⚡ 一體化山丘長方形 */
        .integrated-shape {
            width: 100%;
            height: 100%;
            background-color: var(--temple-blue);
            
            /* ⚡ 核心魔法：使用 SVG 繪製一條包含「山丘」的路徑並進行裁切 */
            /* 邏輯：從左下開始 -> 左上 -> 緩慢隆起成山丘 -> 右上 -> 右下 -> 閉合 */
            clip-path: url(#hill-clip-left);
            
            /* 增加一點平滑感 */
            transition: all 0.5s ease;
            
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 50px;
            color: white;
            font-family: sans-serif;
            font-weight: bold;
            letter-spacing: 2px;

            /* 如果山丘靠左，文字可以靠右 padding-right: 5% */
            /* 如果山丘靠右，文字可以靠左 padding-left: 5% */
            justify-content: flex-start; /* 或是 flex-end */
            padding-left: 10%;
        }

        /* 裝飾用陰影容器 (因為 clip-path 會裁掉 box-shadow) */
        .shadow-wrapper {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 20px 30px rgba(39, 52, 142, 0.2));
        }
    </style>
</head>
<body>

    <div class="hill-container">
        <div class="shadow-wrapper">
            <div class="integrated-shape">
                HILL INTEGRATION
            </div>
        </div>
    </div>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <clipPath id="hill-clip" clipPathUnits="objectBoundingBox">
                <!-- <path d="M 0,1 
                         L 0,0.65 
                         C 0.35,0.65 0.38,0 0.5,0 
                         C 0.62,0 0.65,0.65 1,0.65 
                         L 1,1 
                         Z" /> -->
                <path d="M 0,1 
                    L 0,0.8 
                    C 0.2,0.8 0.4,0.4 0.5,0.4 
                    C 0.6,0.4 0.8,0.8 1,0.8 
                    L 1,1 
                    Z" />
            </clipPath>

            <clipPath id="hill-clip-left" clipPathUnits="objectBoundingBox">
                <path d="M 0,1 
                        L 0,0.4 
                        C 0.1,0.4 0.15,0.4 0.2,0.4 
                        C 0.35,0.4 0.45,0.8 1,0.8 
                        L 1,1 
                        Z" />
            </clipPath>

            <clipPath id="hill-clip-right-half" clipPathUnits="objectBoundingBox">
                <path d="M 0,1 
                        L 0,0.8 
                        C 0.5,0.8 0.7,0.8 0.8,0.8 
                        C 0.9,0.8 0.95,0.4 1,0.4 
                        L 1,1 
                        Z" />
            </clipPath>
        </defs>
    </svg>

</body>
</html>
