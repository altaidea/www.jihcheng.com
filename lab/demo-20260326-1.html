<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jih Cheng Machinery - Search Component</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --jc-primary-blue: #27348E;
            --jc-silver-grey: #999999;
            --jc-transition-speed: 0.4s;
        }

        /* 初始狀態：手風琴包裝器 */
        .search-accordion-wrapper {
            max-width: 400px;
            margin: 50px auto;
            overflow: hidden;
            border-bottom: 2px solid var(--jc-primary-blue);
            transition: all var(--jc-transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 控制按鈕：放大鏡 */
        .search-trigger {
            background: none;
            border: none;
            color: var(--jc-primary-blue);
            font-size: 1.5rem;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .search-trigger:hover {
            transform: scale(1.1);
        }

        /* 展開內容區塊 */
        .search-content {
            max-height: 0; /* 初始高度為0 */
            opacity: 0;
            transition: all var(--jc-transition-speed) ease-in-out;
            padding: 0 10px;
        }

        /* 激活狀態 (手風琴展開) */
        .search-accordion-wrapper.active .search-content {
            max-height: 120px; /* 根據內容調整 */
            opacity: 1;
            padding: 20px 10px;
        }

        /* 內部文字提示 */
        .search-label {
            color: var(--jc-silver-grey);
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-weight: 500;
        }

        /* 搜尋框樣式 */
        .jc-search-input {
            border: 1px solid #ddd;
            border-radius: 0;
            padding: 8px 15px;
        }
        .jc-search-input:focus {
            box-shadow: none;
            border-color: var(--jc-primary-blue);
        }

        /* 關閉按鈕 */
        .btn-close-search {
            font-size: 0.8rem;
            color: var(--jc-silver-grey);
            text-decoration: underline;
            cursor: pointer;
            border: none;
            background: none;
            padding: 5px 0;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container text-center">
        <div id="searchWrapper" class="search-accordion-wrapper bg-white shadow-sm">
            
            <div class="d-flex align-items-center justify-content-between px-3 py-2 cursor-pointer" onclick="toggleSearch(true)">
                <span class="search-label mb-0">點擊搜尋產品或規格...</span>
                <button class="search-trigger" aria-label="Open Search">
                    <i class="bi bi-search"></i>
                </button>
            </div>

            <div class="search-content text-start">
                <div class="input-group mb-2">
                    <input type="text" class="form-control jc-search-input" placeholder="例如：裝盒機 / 充填機..." aria-label="Search">
                    <button class="btn btn-primary bg-primary-blue" style="background-color: #27348E; border: none;">
                        搜尋
                    </button>
                </div>
                <button type="button" class="btn-close-search" onclick="event.stopPropagation(); toggleSearch(false)">
                    <i class="bi bi-x-lg"></i> 關閉選單
                </button>
            </div>
        </div>
    </div>

    <script>
        function toggleSearch(isOpen) {
            const wrapper = document.getElementById('searchWrapper');
            if (isOpen) {
                wrapper.classList.add('active');
            } else {
                wrapper.classList.remove('active');
            }
        }

        // 點擊外部區域自動關閉 (選配，增加使用者體驗)
        document.addEventListener('click', function(event) {
            const wrapper = document.getElementById('searchWrapper');
            if (!wrapper.contains(event.target)) {
                wrapper.classList.remove('active');
            }
        });
    </script>

</body>
</html>
