<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juliet's Search Protocol - Left Expansion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --juliet-pink: #f8bbd0;
            --juliet-deep-pink: #e91e63;
            --transition-speed: 0.4s;
        }

        body {
            background-color: #fdf2f5; /* 鄰家小窩般的柔和背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 搜尋容器：固定高度並靠右對齊內部元素 */
        .search-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            height: 40px;
        }

        /* 搜尋輸入框：初始寬度為 0，向左展開 */
        .search-input-box {
            width: 0;
            height: 36px;
            opacity: 0;
            overflow: hidden;
            transition: width var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                        opacity var(--transition-speed) ease;
            background: white;
            border-radius: 18px 0 0 18px; /* 左側圓角 */
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            position: relative;
        }

        .search-input-box.active {
            width: 180px; /* 您要求的 180px */
            opacity: 1;
            border: 1px solid var(--juliet-pink);
            border-right: none;
        }

        /* 輸入框樣式 */
        .search-control {
            width: 180px;
            height: 100%;
            border: none;
            padding: 0 40px 0 15px;
            font-size: 14px;
            outline: none;
            background: transparent;
            color: #555;
        }

        /* 輸入框內的裝飾搜尋圖示 */
        .inner-icon {
            position: absolute;
            right: 12px;
            color: var(--juliet-pink);
            font-size: 14px;
            pointer-events: none;
        }

        /* 開關按鈕：固定在右側 */
        .search-toggle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: white;
            border: 1px solid var(--juliet-pink);
            color: var(--juliet-pink);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(233, 30, 99, 0.1);
        }

        .search-toggle-btn.active {
            border-radius: 0 18px 18px 0; /* 切換為右側圓角與輸入框結合 */
            border-left: none;
            height: 36px;
            width: 36px;
            background-color: white;
            color: var(--juliet-deep-pink);
        }

        .search-toggle-btn:hover {
            transform: scale(1.05);
            color: var(--juliet-deep-pink);
        }
    </style>
</head>
<body>

    <!-- 搜尋組件 -->
    <div class="search-wrapper">
        <!-- 展開的輸入框區塊 (180*36) -->
        <div id="targetInput" class="search-input-box">
            <input type="text" class="search-control" placeholder="Search">
            <i class="bi bi-search inner-icon"></i>
        </div>

        <!-- 觸發按鈕 -->
        <div id="triggerBtn" class="search-toggle-btn" onclick="executeSearchToggle()">
            <i id="mainIcon" class="bi bi-search"></i>
        </div>
    </div>

    <script>
        function executeSearchToggle() {
            const inputBox = document.getElementById('targetInput');
            const btn = document.getElementById('triggerBtn');
            const icon = document.getElementById('mainIcon');

            // 切換 Active 狀態
            const isActive = inputBox.classList.toggle('active');
            btn.classList.toggle('active');

            // 切換 Icon：搜尋 <-> 關閉
            if (isActive) {
                icon.classList.remove('bi-search');
                icon.classList.add('bi-x-lg');
                // 自動聚焦輸入框
                setTimeout(() => inputBox.querySelector('input').focus(), 200);
            } else {
                icon.classList.remove('bi-x-lg');
                icon.classList.add('bi-search');
            }
        }
    </script>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
