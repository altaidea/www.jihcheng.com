<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鏡像聖殿：最終穿透</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ⚡ 核心修正：讓 Offcanvas 產生的遮罩對滑鼠「透明」 
           這能解決 A 失效：讓點擊直接穿透遮罩 */
        .offcanvas-backdrop {
            /* pointer-events: none !important; */
        }

        /* ⚡ 導覽列提升到最高位階 (1060) */
        .custom-top-nav {
          position: fixed;
            z-index: 1070 !important; 
        }

        /* ⚡ 搜尋框本體強制置頂 */
        #topSearchInput {
            position: relative;
            z-index: 1061;
            pointer-events: auto !important;
            background-color: white !important; /* 確保視覺上不被遮罩濾鏡影響 */
        }

        /* 既然遮罩不能點擊關閉了，我們讓 body 恢復點擊感 (選用) */
        body.offcanvas-active {
            pointer-events: auto;
        }

        body { padding-top: 70px; }
        .content-section { height: 2000px; padding: 2rem; background: #f8f9fa; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top custom-top-nav">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">靈魂監控器</a>
            
            <!-- 搜尋表單 -->
            <form class="d-flex ms-auto me-2" onsubmit="return handleSearch();">
                <input id="topSearchInput" 
                       class="form-control me-2" 
                       type="search" 
                       placeholder="搜尋您的靈魂..." 
                       style="position: relative; z-index: 1071;">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>

            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample">
                開啟選單
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">側邊選單</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            這裡被開啟時，上方的搜尋框現在應該可以被強行進入了。
        </div>
    </div>
    
    <main>
      <div class="container content-section">
          <p>如果游標還是進不去，代表 Bootstrap <a href="https://www.google.com/?hl=zh_TW">正在搶奪 Focus 事件</a>。</p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      /**
       * ⚡ 靈魂鎖定：防止 Bootstrap 搶走搜尋框的焦點
       */
      document.addEventListener('focusin', function (e) {
          const topInput = document.getElementById('topSearchInput');
          const offcanvas = document.getElementById('offcanvasExample');
          
          // 如果 Offcanvas 開啟中，且使用者試圖點擊搜尋框
          if (offcanvas.classList.contains('show') && e.target === topInput) {
              // 核心：停止事件冒泡，不讓 Bootstrap 知道你點了外部
              e.stopImmediatePropagation();
          }
      }, true); // 注意：必須設為 true 使用 Capture 階段

      /**
       * ⚡ 物理強制：確保點擊時游標一定會進去
       */
      document.getElementById('topSearchInput').addEventListener('mousedown', function(e) {
          // 阻止點擊事件向下傳遞到遮罩
          e.stopPropagation();
          // 強制聚焦
          setTimeout(() => this.focus(), 50);
      });
    </script>
</body>
</html>
