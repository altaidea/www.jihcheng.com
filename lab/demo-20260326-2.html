<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jih Cheng Machinery - Elite Nav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --jc-blue: #27348E;
            --jc-silver: #999999;
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        /* 1. 導航基礎設定 */
        .navbar {
            padding: 1.5rem 0;
            transition: all 0.4s ease;
            background: var(--nav-bg);
            border-bottom: 1px solid #eee;
        }

        /* 2. 斷點客製化 (1360px) */
        @media (max-width: 1360px) {
            .navbar-expand-custom .navbar-collapse { display: none !important; }
            .navbar-expand-custom .navbar-toggler { display: block !important; }
        }
        @media (min-width: 1361px) {
            .navbar-toggler { display: none !important; }
            /* 桌機 Hover 下拉 */
            .nav-item.dropdown:hover .dropdown-menu {
                display: block;
                opacity: 1;
                transform: translateY(0);
                visibility: visible;
            }
        }

        /* 3. 華麗漢堡按鈕動畫 */
        .navbar-toggler {
            border: none;
            padding: 0;
            outline: none !important;
            box-shadow: none !important;
            z-index: 1051;
        }
        .hamburger {
            width: 30px;
            height: 20px;
            position: relative;
            cursor: pointer;
        }
        .hamburger span {
            display: block;
            position: absolute;
            height: 2px;
            width: 100%;
            background: var(--jc-blue);
            transition: .3s ease-in-out;
        }
        .hamburger span:nth-child(1) { top: 0; }
        .hamburger span:nth-child(2) { top: 9px; }
        .hamburger span:nth-child(3) { top: 18px; }
        
        /* 漢堡變換 X */
        .navbar-toggler[aria-expanded="true"] .hamburger span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .navbar-toggler[aria-expanded="true"] .hamburger span:nth-child(2) { opacity: 0; }
        .navbar-toggler[aria-expanded="true"] .hamburger span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* 4. Offcanvas 滿版樣式 */
        .offcanvas-full {
            width: 100% !important;
            border: none !important;
            background: var(--jc-blue);
        }
        .offcanvas-full .nav-link {
            color: white !important;
            font-size: 2rem;
            font-weight: 700;
            margin: 1rem 0;
            text-align: center;
        }

        /* 5. 下拉選單動畫微調 */
        .dropdown-menu {
            border-radius: 0;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.3s ease;
            display: block; /* 配合過渡 */
        }

        @media (max-width: 1360px) {
            .dropdown-menu { 
                position: static; 
                opacity: 1; 
                visibility: visible; 
                transform: none; 
                background: rgba(255,255,255,0.1);
                display: none; /* 行動端點擊才顯示 */
            }
            .dropdown-menu.show { display: block; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-custom fixed-top">
    <div class="container-fluid d-flex justify-content-between align-items-center px-4">
        <a class="navbar-brand" href="#">
            <img src="YOUR_LOGO_SVG_HERE" alt="Jih Cheng" height="40">
        </a>

        <div class="collapse navbar-collapse justify-content-end" id="mainNav">
            <ul class="navbar-nav align-items-center">
                <li class="nav-item px-3"><a class="nav-link" href="#">Home</a></li>
                <li class="nav-item dropdown px-3">
                    <a class="nav-link dropdown-toggle" href="#" id="prodDrop" role="button">Products</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Cartoning Machine</a></li>
                        <li><a class="dropdown-item" href="#">Filling Machine</a></li>
                    </ul>
                </li>
                <li class="nav-item px-3"><a class="nav-link" href="#">About</a></li>
                <li class="nav-item ms-4">
                    <a class="btn btn-primary px-4 rounded-pill" style="background-color: #27348E;">Contact Us</a>
                </li>
            </ul>
        </div>

        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav">
            <div class="hamburger">
                <span></span><span></span><span></span>
            </div>
        </button>
    </div>
</nav>

<div class="offcanvas offcanvas-end offcanvas-full" tabindex="-1" id="offcanvasNav">
    <div class="offcanvas-header justify-content-end p-4">
        </div>
    <div class="offcanvas-body d-flex flex-column align-items-center justify-content-center">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
            <li class="nav-item dropdown text-center">
                <a class="nav-link dropdown-toggle" href="#" id="mobileDrop">Products</a>
                <ul class="dropdown-menu text-center bg-transparent border-0">
                    <li><a class="dropdown-item text-white-50" href="#">Cartoning Machine</a></li>
                    <li><a class="dropdown-item text-white-50" href="#">Filling Machine</a></li>
                </ul>
            </li>
            <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        </ul>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 1. 行動端 Dropdown 點擊邏輯
    document.addEventListener('DOMContentLoaded', function() {
        const dropToggle = document.getElementById('mobileDrop');
        dropToggle.addEventListener('click', function(e) {
            if (window.innerWidth <= 1360) {
                e.preventDefault();
                const menu = this.nextElementSibling;
                menu.classList.toggle('show');
            }
        });

        // 2. Offcanvas GSAP 動畫 (當選單打開時)
        const offcanvasElement = document.getElementById('offcanvasNav');
        offcanvasElement.addEventListener('show.bs.offcanvas', function () {
            gsap.from(".offcanvas-body .nav-link", {
                y: 50,
                opacity: 0,
                duration: 0.6,
                stagger: 0.1,
                ease: "power3.out",
                delay: 0.2
            });
        });
    });
</script>

</body>
</html>
