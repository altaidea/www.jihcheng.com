<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jih Cheng Machinery - Standard Nav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --jc-blue: #27348E;
        }
        /* 僅微調 Logo 與配色以符合紀正機械視覺 */
        .navbar-brand svg { fill: var(--jc-blue); }
        .btn-primary { background-color: var(--jc-blue); border: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="#">
      <strong>Jih Cheng</strong>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Products
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Cartoning Machine</a></li>
              <li><a class="dropdown-item" href="#">Filling Machine</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#">All Solutions</a></li>
            </ul>
          </li>
        </ul>
        
        <form class="d-flex mt-3 mt-lg-0" role="search">
          <button class="btn btn-primary rounded-pill px-4" type="submit">Contact Us</button>
        </form>
      </div>
    </div>
  </div>
</nav>

<div class="container text-center">
    <div id="searchWrapper" class="search-accordion-wrapper bg-white shadow-sm">
        
        <div class="d-flex align-items-center justify-content-between px-3 py-2 cursor-pointer" onclick="toggleSearch(true)">
            <span class="search-label mb-0">點擊搜尋產品或規格...</span>
            <button class="search-trigger" aria-label="Open Search">
                <i class="bi bi-search"></i>
            </button>
        </div>

        <div class="search-content text-start">
            <div class="input-group mb-2">
                <input type="text" class="form-control jc-search-input" placeholder="例如：裝盒機 / 充填機..." aria-label="Search">
                <button class="btn btn-primary bg-primary-blue" style="background-color: #27348E; border: none;">
                    搜尋
                </button>
            </div>
            <button type="button" class="btn-close-search" onclick="event.stopPropagation(); toggleSearch(false)">
                <i class="bi bi-x-lg"></i> 關閉選單
            </button>
        </div>
    </div>
</div>

<div style="margin-top: 100px;" class="container">
    <h1>Welcome to Jih Cheng</h1>
    <p>這是官方標準版的 Bootstrap 5 Offcanvas 導航測試。</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
