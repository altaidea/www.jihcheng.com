<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jih Cheng Machinery - Standard Nav Optimized</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --jc-blue: #27348E;
            --transition-speed: 0.3s;
        }

        .navbar-brand strong { color: var(--jc-blue); }
        .btn-primary { background-color: var(--jc-blue); border: none; }

        /* --- 桌機版 (Large screen) 強化 --- */
        @media (min-width: 992px) {
            /* 1. 滑過展開邏輯 */
            .navbar-nav .nav-item.dropdown:hover .dropdown-menu {
                display: block;
                opacity: 1;
                visibility: visible;
                transform: translateY(0);
                margin-top: 0; /* 修正間距 */
            }

            /* 2. 下拉選單動畫微調 (選配，增加質感) */
            .dropdown-menu {
                display: block; /* 必須設為 block 才能套用動畫 */
                opacity: 0;
                visibility: hidden;
                transform: translateY(10px);
                transition: all var(--transition-speed) ease-in-out;
                border-radius: 0;
                border: none;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            }

            /* 3. 移除點擊展開：停用原本 BS 的 JS 點擊行為 */
            .navbar-nav .dropdown-toggle::after {
                display: inline-block; /* 保留小箭頭 */
            }
            /* 讓觸發點在桌機版不響應點擊 (指針事件不干擾 hover) */
            .navbar-nav .nav-link.dropdown-toggle {
                pointer-events: auto; 
                cursor: default;
            }
        }

        /* --- 行動端 (Offcanvas) 修正 --- */
        @media (max-width: 991.98px) {
            /* 確保 Offcanvas 內的下拉選單在點擊時能正常運作 */
            .offcanvas-body .dropdown-menu {
                border: none;
                background-color: rgba(0, 0, 0, 0.03);
                transform: none !important;
                transition: none !important;
            }
            .offcanvas-body .nav-link {
                font-size: 1.1rem;
            }
        }
    </style>

    <style>
      /* --- 獨立漢堡按鈕動畫樣式 --- */
      .custom-hamburger {
          width: 30px;
          height: 22px;
          position: relative;
          background: transparent;
          border: none;
          cursor: pointer;
          z-index: 2000; /* 高於一切，確保可點擊關閉 */
          padding: 0;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          align-items: flex-end; /* 讓內容靠右 */
      }

      .hamburger-line {
          height: 2px;
          background-color: var(--jc-blue);
          transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
          border-radius: 2px;
      }

      .line-1 { width: 100%; }
      .line-2 { width: 60%; } /* 中間較短 */
      .line-3 { width: 100%; }

      /* 漢堡變換 X 狀態 */
      .custom-hamburger.active .hamburger-line { background-color: #FFFFFF; } /* 滿版藍底時變白 */
      .custom-hamburger.active .line-1 { transform: translateY(10px) rotate(45deg); width: 100%; }
      .custom-hamburger.active .line-2 { opacity: 0; width: 0; }
      .custom-hamburger.active .line-3 { transform: translateY(-10px) rotate(-45deg); width: 100%; }
    </style>

    <style>
      /* --- Offcanvas 滿版修正 --- */
      .offcanvas.offcanvas-end.full-screen {
          width: 100% !important;
          border: none;
          background-color: var(--jc-blue);
          z-index: 1500;
      }

      .offcanvas.full-screen .nav-link {
          color: white !important;
          font-size: 2rem;
          font-weight: 700;
          text-align: center;
          margin: 1rem 0;
      }

      .offcanvas.full-screen .dropdown-menu {
          background-color: rgba(255,255,255,0.1);
          border: none;
          text-align: center;
      }

      .offcanvas.full-screen .dropdown-item {
          color: rgba(255,255,255,0.7) !important;
          font-size: 1.2rem;
      }
    </style>

    <style>
      /* 隱藏預設關閉按鈕，我們使用漢堡 */
      .offcanvas-header .btn-close { display: none; }

      /* --- 原有邏輯：桌機版 (Large screen) --- */
      @media (min-width: 992px) {
          .navbar-nav .nav-item.dropdown:hover .dropdown-menu {
              display: block;
              opacity: 1;
              visibility: visible;
              transform: translateY(0);
          }

          .dropdown-menu {
              display: block;
              opacity: 0;
              visibility: hidden;
              transform: translateY(10px);
              transition: all var(--transition-speed) ease-in-out;
              border-radius: 0;
              border: none;
              box-shadow: 0 10px 30px rgba(0,0,0,0.1);
              position: absolute; /* 確保不推擠空間 */
          }

          .navbar-nav .nav-link.dropdown-toggle { cursor: default; }
          .custom-hamburger { display: none; } /* 桌機隱藏 */
      }

      /* --- 行動端微調 --- */
      @media (max-width: 991.98px) {
          .navbar-collapse { display: none !important; }
          .custom-hamburger { display: flex; }
      }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="#">
      <strong>Jih Cheng</strong>
    </a>

    <button class="custom-hamburger" id="hamburgerBtn" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
      <span class="hamburger-line line-1"></span>
      <span class="hamburger-line line-2"></span>
      <span class="hamburger-line line-3"></span>
    </button>

    <div class="offcanvas offcanvas-end full-screen" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="productsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Products
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Cartoning Machine</a></li>
              <li><a class="dropdown-item" href="#">Filling Machine</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#">All Solutions</a></li>
            </ul>
          </li>
        </ul>
        
        <form class="d-flex mt-3 mt-lg-0" role="search">
          <button class="btn btn-primary rounded-pill px-4" type="submit">Contact Us</button>
        </form>
      </div>
    </div>
  </div>
</nav>

<div style="margin-top: 150px;" class="container">
    <h1>Quality Policy & Productivity</h1>
    <p>主人，現在桌機版滑過 "Products" 會自動展開，點擊則不會有反應。而在行動端（縮小視窗點擊漢堡），點擊依然能正常展開下拉選單。</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const offcanvasEl = document.getElementById('offcanvasNavbar');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const dropdownToggle = document.getElementById('productsDropdown');
        const mobileDropdown = document.getElementById('mobileDropdown');

        // 1. 同步漢堡動畫狀態
        offcanvasEl.addEventListener('show.bs.offcanvas', () => hamburgerBtn.classList.add('active'));
        offcanvasEl.addEventListener('hide.bs.offcanvas', () => hamburgerBtn.classList.remove('active'));

        // 2. 混合邏輯：桌機版處理
        function handleNavBehavior() {
            if (window.innerWidth >= 992) {
                dropdownToggle.removeAttribute('data-bs-toggle');
            } else {
                dropdownToggle.setAttribute('data-bs-toggle', 'dropdown');
            }
        }

        // 3. 行動端下拉點擊邏輯
        mobileDropdown.addEventListener('click', function(e) {
            if (window.innerWidth < 992) {
                e.preventDefault();
                e.stopPropagation();
                this.nextElementSibling.classList.toggle('show');
            }
        });

        handleNavBehavior();
        window.addEventListener('resize', handleNavBehavior);
    });
</script>

</body>
</html>
