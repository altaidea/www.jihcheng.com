<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jih Cheng Machinery - Symmetrical Transition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
      :root {
        --jc-blue: #27348E;
        --transition-speed: 0.3s;
        --jc-primary-blue: #27348E;
        --jc-silver-grey: #999999;
        --jc-transition-speed: 0.4s;
        --nav-height: 70px;
        --top-height: 40px;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body { padding-top: calc(var(--nav-height) + var(--top-height)); }

      /* --- Top Header (功能層) --- */
      .top-header {
        background-color: var(--jc-blue);
        
        color: white;
        font-size: 0.85rem;
        padding: 8px 0;
        
        position: fixed;
        top: 0; 
        z-index: 1060;

        width: 100%; 
        height: var(--top-height);
        
        transition: transform 0.3s ease;

        display: flex; 
        align-items: center;
      }

      /* --- 頂部選單特定樣式 --- */
      .top-header .dropdown-menu {
          background-color: var(--jc-blue);
          border: 1px solid rgba(255,255,255,0.1);
          margin-top: 8px !important;
          min-width: 111px; /* 寬度會導致偏移 */
      }

      .top-header .dropdown-item { color: white; padding: 10px 20px; transition: 0.3s; font-size: 0.85rem; }
      .top-header .dropdown-item:hover { background-color: white; color: var(--jc-blue); }
      .top-header a { color: rgba(255,255,255,0.8); text-decoration: none; transition: 0.2s; }
      .top-header a:hover { color: white; }

      /* 頂部搜尋與語言切換 */
      .top-tools .dropdown { position: relative; }
      .top-tools .dropdown-toggle { border: none; background: transparent; color: white; font-size: 0.85rem; }
      .top-tools .dropdown-toggle::after { vertical-align: middle; }
      .search-trigger { background: transparent; border: none; color: white; padding: 0 15px; cursor: pointer; }

      .sns-links a { margin-right: 15px; font-size: 1rem; }

      /* --- 🎯 下拉選單：終極對稱動畫修正 --- */
      header .dropdown-menu {
          display: block; /* 必須為 block 才能執行 transform 動畫 */
          opacity: 0;
          transform: translateY(10px);
          
          /* 關鍵：Visibility 處理 */
          visibility: hidden;
          
          /* 關閉時的過渡：visibility 要等 0.3s (延遲) 再變隱藏 */
          transition: 
            opacity var(--transition-speed) ease-in-out, 
            transform var(--transition-speed) ease-in-out, 
            visibility 0s linear var(--transition-speed); 
          
          border-radius: 0; 
          border: none; 
          box-shadow: 0 10px 30px rgba(0,0,0,0.1);
          pointer-events: none;
      }

      /* 當選單開啟時 (.show) */
      .dropdown-menu.show {
          opacity: 1;
          visibility: visible;
          transform: translateY(0);
          pointer-events: auto;
          
          /* 開啟時的過渡：visibility 必須瞬間變為 visible (無延遲) */
          transition: 
            opacity var(--transition-speed) ease-in-out, 
            transform var(--transition-speed) ease-in-out, 
            visibility 0s linear 0s; 
      }

      /* 主導覽列樣式 (示範) */
      .main-navbar {
          background: white;
          position: fixed;
          top: 40px; width: 100%; z-index: 1050;
          border-bottom: 1px solid #eee;
          padding: 10px 0;
      }
    </style>

    <style>

      .navbar-brand strong { color: var(--jc-blue); }
      .btn-primary { background-color: var(--jc-blue); border: none; }

      /* --- 獨立漢堡按鈕動畫樣式 --- */
      .custom-hamburger {
          width: 30px;
          height: 22px;
          position: relative;
          background: transparent;
          border: none;
          cursor: pointer;
          z-index: 2000; /* 高於一切，確保可點擊關閉 */
          padding: 0;
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          align-items: flex-end; /* 讓內容靠右 */
      }

      .hamburger-line {
          height: 2px;
          background-color: var(--jc-blue);
          transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
          border-radius: 2px;
      }

      .line-1 { width: 100%; }
      .line-2 { width: 60%; } /* 中間較短 */
      .line-3 { width: 100%; }

      /* 漢堡變換 X 狀態 */
      .custom-hamburger.active .hamburger-line { background-color: #FFFFFF; } /* 滿版藍底時變白 */
      .custom-hamburger.active .line-1 { transform: translateY(10px) rotate(45deg); width: 100%; }
      .custom-hamburger.active .line-2 { opacity: 0; width: 0; }
      .custom-hamburger.active .line-3 { transform: translateY(-10px) rotate(-45deg); width: 100%; }

      /* --- Offcanvas 滿版修正 --- */
      .offcanvas.offcanvas-end.full-screen {
          width: 100% !important;
          border: none;
          background-color: var(--jc-blue);
          z-index: 1500;
      }

      @media (max-width: 992px) {
        .offcanvas.full-screen .nav-link {
            color: white !important;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin: 1rem 0;
        }

        .offcanvas.full-screen .dropdown-item {
          color: rgba(255,255,255,0.7) !important;
          font-size: 1.2rem;
        }

        .offcanvas-title{
          color: white;
        }
      }

      .offcanvas.full-screen .dropdown-menu {
          background-color: rgba(255,255,255,0.1);
          border: none;
          text-align: center;
      }

      /* --- 原有邏輯：桌機版 (Large screen) --- */
      @media (min-width: 992px) {
        .navbar-nav .nav-item.dropdown:hover .dropdown-menu {
            display: block;
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu {
            display: block;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all var(--transition-speed) ease-in-out;
            border-radius: 0;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: absolute; /* 確保不推擠空間 */
        }

        .navbar-nav .nav-link.dropdown-toggle { cursor: default; }
        .custom-hamburger { display: none; } /* 桌機隱藏 */
      }

      /* --- 行動端微調 --- */
      @media (max-width: 991.98px) {
          .navbar-collapse { display: none !important; }
          .custom-hamburger { display: flex; }
      }

      @media (max-width: 1360px) {
        .navbar-collapse { display: none !important; }
        .navbar-toggler { display: block !important; }
        
        .offcanvas-body .dropdown-menu {
            position: static; 
            display: none; 
            background: rgba(255,255,255,0.1); 
            width: 100%;
            text-align: center;
        }
        .offcanvas-body .dropdown-menu.show { display: block; }
        .offcanvas-body .dropdown-item { color: rgba(255,255,255,0.8) !important; font-size: 1.2rem; }
      }

      /* --- 行動端 (Offcanvas) 絲滑度強化 --- */
      @media (max-width: 991.98px) {
        /* 1. 隱藏預設箭頭，或美化它 */
        .offcanvas-body .dropdown-toggle::after {
          transition: transform 0.3s ease;
        }
        .offcanvas-body .dropdown-toggle.show::after {
          transform: rotate(180deg);
        }

        /* 2. 核心絲滑過渡：使用 max-height 配合 opacity */
        .offcanvas-body .dropdown-menu {
          display: block !important; /* 必須為 block 才能計算高度 */
          max-height: 0;
          opacity: 0;
          overflow: hidden;
          transform: translateY(-10px);
          transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                      opacity 0.3s ease, 
                      transform 0.4s ease;
          background: rgba(255, 255, 255, 0.05) !important;
          border-radius: 12px;
          margin: 0 1rem;
          padding: 0;
        }

        /* 3. 展開狀態 */
        .offcanvas-body .dropdown-menu.show {
          max-height: 500px; /* 給一個足夠大的預估高度 */
          opacity: 1;
          transform: translateY(0);
          padding: 10px 0;
          margin-top: 10px;
          margin-bottom: 10px;
        }

        /* 4. 項目進場微動效 */
        .offcanvas-body .dropdown-item {
          transition: background 0.2s, padding-left 0.3s ease;
          padding: 12px 1.5rem;
        }
        
        .offcanvas-body .dropdown-item:active {
          background: rgba(255, 255, 255, 0.15);
          padding-left: 2rem; /* 點擊時有向右推的物理感 */
        }
      }

      /* --- 原有邏輯：桌機版 (Large screen) --- */
      @media (min-width: 992px) {
        /* 1. 滑過展開邏輯 (原有代碼) */
        .navbar-nav .nav-item.dropdown:hover .dropdown-menu {
            display: block;
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* --- 【新加入】三角形旋轉動畫 --- */
        .navbar-nav .nav-item.dropdown .dropdown-toggle::after {
            transition: transform var(--transition-speed) ease;
            vertical-align: middle; /* 確保旋轉時中心點對齊 */
        }

        /* 當父層 nav-item 被 hover 時，旋轉內部的 ::after */
        .navbar-nav .nav-item.dropdown:hover .dropdown-toggle::after {
            transform: rotate(180deg);
        }
        /* ------------------------------ */

        .dropdown-menu {
            display: block;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all var(--transition-speed) ease-in-out;
            border-radius: 0;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: absolute;
        }

        .navbar-nav .nav-link.dropdown-toggle { cursor: default; }
        .custom-hamburger { display: none; }
      }
    </style>

    <style>
      body{ padding-top: 98px; }
      .navbar.fixed-top { top: 42px; }
    </style>

    <style>
      .top-header a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
      .top-header a:hover { color: white; }

      /* --- 2. Main Navbar (品牌層) --- */
      .main-navbar {
          background: white;
          height: var(--nav-height);
          position: fixed;
          top: var(--top-height); width: 100%; z-index: 1040;
          border-bottom: 1px solid #eee;
          display: flex; align-items: center;
      }
      .navbar-brand strong { color: var(--jc-blue); font-size: 1.5rem; }

      /* --- 3. 獨立搜尋手風琴層 (解耦設計) --- */
      .search-accordion-layer {
          position: fixed;
          top: calc(var(--nav-height) + var(--top-height));
          left: 0; width: 100%;
          height: 0; /* 初始高度為 0 */
          background: var(--jc-blue);
          overflow: hidden;
          transition: var(--transition);
          z-index: 1030;
          box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      }
      .search-accordion-layer.active { height: 80px; } /* 展開高度 */

      .search-inner {
          max-width: 1200px; margin: 0 auto; height: 100%;
          display: flex; align-items: center; padding: 0 2rem;
      }
      .search-input {
          flex-grow: 1; background: transparent; border: none;
          border-bottom: 1px solid rgba(255,255,255,0.3);
          color: white; padding: 10px; outline: none; font-size: 1.2rem;
      }
      .search-close-btn { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

<header class="top-header fixed-top">
  <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
    <div class="sns-links d-none d-md-block">
      <a href="#" class="text-white-50 me-3"><i class="bi bi-facebook"></i></a>
      <a href="#" class="text-white-50 me-3"><i class="bi bi-linkedin"></i></a>
      <a href="#" class="text-white-50"><i class="bi bi-youtube"></i></a>
    </div>

    <div class="top-tools d-flex align-items-center">
      <div class="dropdown me-2">
        <button class="dropdown-toggle" type="button" data-bs-toggle="dropdown" data-bs-display="static" aria-expanded="false">
          <i class="bi bi-globe2 me-1"></i> Language
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
          <li><a class="dropdown-item" href="#">繁體中文</a></li>
          <li><a class="dropdown-item" href="#">English</a></li>
          <li><a class="dropdown-item" href="#">日本語</a></li>
        </ul>
      </div>
      <a href="javascript:void(0)" onclick="toggleSearch()" class="search-btn text-white"><i class="bi bi-search"></i></a>
    </div>
  </div>
</header>

<nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top shadow-sm">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="#">
      <strong>Jih Cheng</strong>
    </a>

    <button class="custom-hamburger" id="hamburgerBtn" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
      <span class="hamburger-line line-1"></span>
      <span class="hamburger-line line-2"></span>
      <span class="hamburger-line line-3"></span>
    </button>

    <div class="offcanvas offcanvas-end full-screen" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">Menu</h5>
      </div>
      
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="productsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              Products
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Cartoning Machine</a></li>
              <li><a class="dropdown-item" href="#">Filling Machine</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#">All Solutions</a></li>
            </ul>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div id="searchLayer" class="search-accordion-layer">
    <div class="search-inner">
        <input type="text" class="search-input" placeholder="Enter keywords to search...">
        <button class="search-close-btn" onclick="toggleSearch()"><i class="bi bi-x-lg"></i></button>
    </div>
</div>

<div class="container mt-5">
    <h2>Juliet's Precision Engineering</h2>
    <p>主人，我已經重新設計了選單的過渡邏輯。透過對 <strong>Visibility Delay</strong> 的控制，開啟與關閉的路徑現在完美重合，不再有突兀的閃現感。</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const offcanvasEl = document.getElementById('offcanvasNavbar');
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    // 直接統一抓取這個 ID
    const productsDropdown = document.getElementById('productsDropdown');

    // 1. 同步漢堡動畫狀態
    offcanvasEl.addEventListener('show.bs.offcanvas', () => hamburgerBtn.classList.add('active'));
    offcanvasEl.addEventListener('hide.bs.offcanvas', () => hamburgerBtn.classList.remove('active'));

    // 2. 混合邏輯：桌機與行動行為切換
    function handleNavBehavior() {
        if (window.innerWidth >= 992) {
            productsDropdown.removeAttribute('data-bs-toggle');
            // 移除手機端可能留下的 show class
            productsDropdown.nextElementSibling.classList.remove('show');
        } else {
            productsDropdown.setAttribute('data-bs-toggle', 'dropdown');
        }
    }

    // 3. 行動端專屬絲滑點擊
    productsDropdown.addEventListener('click', function(e) {
        if (window.innerWidth < 992) {
            // 讓 Bootstrap 的預設行為處理選單開關，我們只負責滑動的順暢感
            // 由於 CSS 已經處理了 max-height，這裡不需要額外 JS 介入
            console.log("機械核心：移動端下拉觸發");
        }
    });

    handleNavBehavior();
    window.addEventListener('resize', handleNavBehavior);
  });
</script>

<script>
    // 1. 搜尋層開關
    function toggleSearch() {
        document.getElementById('searchLayer').classList.toggle('active');
    }

    // 2. 漢堡與 Offcanvas 同步
    const offcanvas = document.getElementById('mobileMenu');
    const burger = document.getElementById('hamburgerBtn');
    offcanvas.addEventListener('show.bs.offcanvas', () => burger.classList.add('active'));
    offcanvas.addEventListener('hide.bs.offcanvas', () => burger.classList.remove('active'));

    // 3. 點擊外部關閉搜尋
    document.addEventListener('click', (e) => {
        const layer = document.getElementById('searchLayer');
        if (!layer.contains(e.target) && !e.target.closest('.search-btn')) {
            layer.classList.remove('active');
        }
    });
</script>
</body>
</html>
