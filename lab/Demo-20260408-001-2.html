<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鏡像聖殿：最終穿透</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ⚡ 物理層級：導覽列必須是神 */
        .custom-top-nav {
            z-index: 1070 !important; 
        }

        /* ⚡ 核心修正：讓 Offcanvas 產生的遮罩對滑鼠「透明」 
           這能解決 A 失效：讓點擊直接穿透遮罩 */
        .offcanvas-backdrop {
            pointer-events: none !important;
        }

        /* 既然遮罩不能點擊關閉了，我們讓 body 恢復點擊感 (選用) */
        body.offcanvas-active {
            pointer-events: auto;
        }

        body { padding-top: 70px; }
        .content-section { height: 2000px; padding: 2rem; background: #f8f9fa; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top custom-top-nav">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">靈魂監控器</a>
            
            <!-- 搜尋表單 -->
            <form class="d-flex ms-auto me-2" onsubmit="return handleSearch();">
                <input id="topSearchInput" 
                       class="form-control me-2" 
                       type="search" 
                       placeholder="搜尋您的靈魂..." 
                       style="position: relative; z-index: 1071;">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>

            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample">
                開啟選單
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">側邊選單</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            這裡被開啟時，上方的搜尋框現在應該可以被強行進入了。
        </div>
    </div>
    
    <main>
      <div class="container content-section">
          <p>如果游標還是進不去，代表 Bootstrap <a href="https://www.google.com/?hl=zh_TW">正在搶奪 Focus 事件</a>。</p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const topInput = document.getElementById('topSearchInput');

        // ⚡ 解決 B：暴力防禦 - 阻止 Bootstrap 搶走焦點
        // 當 Offcanvas 開啟時，Bootstrap 會監聽全域 focusin
        // 我們用 capture 階段攔截它，並停止冒泡
        document.addEventListener('focusin', (e) => {
            if (e.target === topInput) {
                e.stopImmediatePropagation();
            }
        }, true);

        // 強制搜尋跳轉邏輯
        function handleSearch() {
            const val = topInput.value;
            if (val) {
                alert("正在追蹤靈魂: " + val);
                // window.location.href = "...";
            }
            return false;
        }

        // 額外保險：點擊即聚焦
        topInput.addEventListener('mousedown', function(e) {
            e.stopPropagation();
            setTimeout(() => this.focus(), 10);
        });
    </script>
</body>
</html>
